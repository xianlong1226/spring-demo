server:
  port: 8080

spring:
  application:
    name: springboot-demo

  # DevTools 热更新配置
  devtools:
    restart:
      enabled: true           # 开启热重启
      additional-paths: src/main  # 监控的额外路径
    livereload:
      enabled: true           # 开启浏览器自动刷新（前端开发时有用）

  # PostgreSQL 数据源
  datasource:
    url: jdbc:postgresql://localhost:5432/springboot_demo
    username: long
    password: 123456
    driver-class-name: org.postgresql.Driver

  # JPA 配置
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update    # 开发阶段自动建表，生产改 validate
    show-sql: true        # 控制台打印 SQL，方便学习
    open-in-view: false   # 关闭 OSIV，避免懒加载问题

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

# JWT 配置
jwt:
  secret: your-256-bit-secret-key-change-this-in-production-abc123xyz
  expiration: 86400000   # 24小时（毫秒）

# MyBatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true    # 数据库下划线 → Java 驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印 SQL
  type-aliases-package: com.example.modules.article.entity

# PageHelper 配置
pagehelper:
  helper-dialect: postgresql
  reasonable: true          # 页码合理化：page<1 查第一页，page>总页查最后一页

# 日志级别
logging:
  level:
    com.example: debug
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace  # 打印 SQL 参数
